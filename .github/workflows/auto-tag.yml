name: Auto-tag release

on:
  push:
    branches: [main]
    paths:
      - 'kernel/Cargo.toml'

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        run: |
          NEW_VERSION=$(grep '^version' kernel/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          OLD_VERSION=$(git show HEAD~1:kernel/Cargo.toml 2>/dev/null | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/' || echo "")
          echo "old=$OLD_VERSION"
          echo "new=$NEW_VERSION"
          if [ "$NEW_VERSION" != "$OLD_VERSION" ] && [ -n "$NEW_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check tag does not already exist
        if: steps.version.outputs.changed == 'true'
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.version.outputs.changed == 'true' && steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged $TAG"
