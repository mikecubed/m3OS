name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # GitHub hosted runners have 2 vCPUs. Match -smp to avoid oversubscribing
      # the emulated scheduler, which destabilizes login/IPC timing. Local dev
      # still gets -smp 4 via the default in xtask::qemu_smp_count().
      M3OS_SMP: "2"
      # Pure-TCG CI can't compile hello.c with TCC through the Phase 54
      # extracted-VFS IPC path within any reasonable per-step budget. The
      # guest smoke-runner treats this marker as "emit SKIP instead of PASS"
      # for tcc-compile + hello. Local/nightly runs still exercise the full
      # compile path.
      M3OS_SMOKE_SKIP_TCC_COMPILE: "1"
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: x86_64-unknown-linux-musl
          components: rustfmt, clippy, rust-src

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf musl-tools qemu-utils e2fsprogs

      - name: Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: TCC build cache
        uses: actions/cache@v5
        with:
          path: |
            target/tcc-src
            target/tcc-staging
          key: ${{ runner.os }}-tcc-${{ hashFiles('xtask/src/main.rs') }}
          restore-keys: ${{ runner.os }}-tcc-

      - name: "Gate bundle: cargo xtask check (clippy + fmt + host tests)"
        run: cargo xtask check

      - name: Allocator loom concurrency tests
        run: RUSTFLAGS='--cfg loom' cargo test -p kernel-core --target x86_64-unknown-linux-gnu --test allocator_loom

      - name: "Smoke test (headless workflow: boot + login + auth + service + storage + log + TCC)"
        run: |
          # Delete cached disk.img so it is regenerated with TCC files.
          rm -f target/x86_64-unknown-none/release/disk.img
          cargo xtask smoke-test --timeout 300

      - name: Regression suite (SMP races + headless operator workflows)
        # Pure TCG under -smp 2: boots run ~15-20s, so each test needs
        # generous headroom beyond its per-step waits.
        run: cargo xtask regression --timeout 180

      - name: Upload regression artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: regression-artifacts
          path: target/regression/
          retention-days: 14
