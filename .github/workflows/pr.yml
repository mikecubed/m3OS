name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: x86_64-unknown-linux-musl
          components: rustfmt, clippy, rust-src

      - name: Install system dependencies
        # musl-tools + qemu-utils + e2fsprogs are needed by `cargo xtask check`
        # (cross-compile + disk-image build paths). QEMU itself is not needed
        # on the PR gate — smoke and regression run on developer hardware via
        # the pre-push hook and in the nightly workflow.
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools qemu-utils e2fsprogs

      - name: Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: TCC build cache
        uses: actions/cache@v5
        with:
          path: |
            target/tcc-src
            target/tcc-staging
          key: ${{ runner.os }}-tcc-${{ hashFiles('xtask/src/main.rs') }}
          restore-keys: ${{ runner.os }}-tcc-

      - name: "Gate bundle: cargo xtask check (clippy + fmt + host tests)"
        run: cargo xtask check

      - name: Allocator loom concurrency tests
        run: RUSTFLAGS='--cfg loom' cargo test -p kernel-core --target x86_64-unknown-linux-gnu --test allocator_loom
