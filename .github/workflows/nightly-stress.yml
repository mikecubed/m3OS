name: Nightly Stress Tests

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of stress iterations'
        required: false
        default: '50'
      test:
        description: 'Stress test name (fork-overlap, pty-overlap, ssh-overlap)'
        required: false
        default: 'ssh-overlap'

permissions:
  contents: read

jobs:
  stress:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: x86_64-unknown-linux-musl
          components: rustfmt, clippy, rust-src

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf musl-tools qemu-utils e2fsprogs

      - name: Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: TCC build cache
        uses: actions/cache@v5
        with:
          path: |
            target/tcc-src
            target/tcc-staging
          key: ${{ runner.os }}-tcc-${{ hashFiles('xtask/src/main.rs') }}
          restore-keys: ${{ runner.os }}-tcc-

      - name: "Smoke test (full-system: boot + login + auth + service + storage + log + TCC)"
        # Per-step waits scale 3x under CI TCG to absorb shared-runner jitter;
        # Sleep durations are not scaled (they're deliberate settle delays).
        env:
          M3OS_SMP: "2"
          M3OS_CI_TIMING_MULT: "3"
        run: |
          rm -f target/x86_64-unknown-none/release/disk.img
          cargo xtask smoke-test --timeout 900

      - name: "Regression suite (SMP races + headless operator workflows)"
        env:
          M3OS_SMP: "2"
          M3OS_CI_TIMING_MULT: "3"
        run: cargo xtask regression --timeout 360

      - name: Run stress test
        run: |
          TEST="${{ github.event.inputs.test || 'ssh-overlap' }}"
          ITERS="${{ github.event.inputs.iterations || '50' }}"
          cargo xtask stress --test "$TEST" --iterations "$ITERS" --timeout 90 --continue-on-failure

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-artifacts
          path: |
            target/stress/
            target/regression/
          retention-days: 14
