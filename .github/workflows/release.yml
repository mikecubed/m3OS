name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.3.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt, clippy, rust-src

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf musl-tools qemu-utils

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Lint (clippy + fmt)
        run: cargo xtask check

      - name: Build disk images
        run: cargo xtask image

      - name: Boot smoke test
        run: |
          timeout 30 cargo xtask run 2>&1 | tee boot.log || true
          # Phase 20: userspace init prints banner, shell prints prompt
          grep -q 'm3OS init (PID 1)' boot.log
          ! grep -q 'panicked at' boot.log

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp target/x86_64-unknown-none/release/boot-uefi-m3os.img release/
          cp target/x86_64-unknown-none/release/boot-uefi-m3os.vhdx release/ 2>/dev/null || true
          cp target/x86_64-unknown-none/release/kernel release/kernel.elf

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          make_latest: true
          files: |
            release/boot-uefi-m3os.img
            release/boot-uefi-m3os.vhdx
            release/kernel.elf
