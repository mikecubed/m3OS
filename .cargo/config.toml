[build]
# Always build the kernel for the bare-metal x86_64 target.
# The custom target disables the red zone, SSE, and sets panic=abort.
target = "kernel/x86_64-ostest.json"

# xtask is a host binary — exempt it from the kernel target
[target.'cfg(target_os = "none")']
runner = "cargo xtask runner"

[target.x86_64-ostest]
runner = "cargo xtask runner"

[unstable]
# Required for custom target JSON files
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]
