[build]
# Always build the kernel for the bare-metal x86_64 target.
# x86_64-unknown-none disables the red zone, SSE, and sets panic=abort.
target = "x86_64-unknown-none"

# xtask is a host binary — exempt it from the kernel target
[target.'cfg(target_os = "none")']
runner = "cargo xtask runner"

[target.x86_64-unknown-none]
runner = "cargo xtask runner"

[alias]
xtask = "run --package xtask --target x86_64-unknown-linux-gnu --"
