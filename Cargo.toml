[workspace]
members = [
    "kernel",
    "xtask",
    # Phase 11 userspace test binaries
    "userspace/syscall-lib",
    "userspace/exit0",
    "userspace/fork-test",
    "userspace/echo-args",
    # Future userspace servers (Phase 12+):
    # "userspace/init",
    # "userspace/console_server",
    # "userspace/vfs_server",
    # "userspace/fat_server",
    # "userspace/kbd_server",
    # "userspace/shell",
]

# Exclude xtask and userspace from default build — kernel only
default-members = ["kernel"]

resolver = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[profile.dev]
panic = "abort"
