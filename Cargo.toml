[workspace]
members = [
    "kernel",
    "xtask",
]
# userspace members added as they are created:
# "userspace/init",
# "userspace/console_server",
# "userspace/vfs_server",
# "userspace/fat_server",
# "userspace/kbd_server",
# "userspace/shell",

# Exclude xtask from default build — it's a host tool, not part of the OS image
default-members = ["kernel"]

resolver = "2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[profile.dev]
panic = "abort"
